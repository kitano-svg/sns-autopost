name: daily-sns-post

on:
  schedule:
    # UTC指定。'0 9 * * *' = 日本時間 18:00（毎日）
    # 変更例: 朝7:30 JST → '30 22 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true にすると投稿せず画像生成まで（テスト用）'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: daily-sns-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Japanese fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install dependencies
        run: npm ci

      - name: リサーチ (Claude + Web検索)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/research.mjs

      - name: 画像生成 (AI背景 + テンプレ文字入れ)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-image.mjs

      - name: 画像をリポジトリにコミット (Instagram用の公開URL)
        id: commitimg
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          mkdir -p posts
          cp out/post.png "posts/${DATE}.png"
          cp out/research.json "posts/${DATE}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts
          git commit -m "post: ${DATE}" || echo "no changes"
          git push
          echo "image_url=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/posts/${DATE}.png" >> "$GITHUB_OUTPUT"

      - name: Xへ投稿
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/post-x.mjs

      - name: Instagramへ投稿
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_URL: ${{ steps.commitimg.outputs.image_url }}
        run: node scripts/post-instagram.mjs

      - name: 成果物を保存 (確認用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-output
          path: out/
          retention-days: 14
