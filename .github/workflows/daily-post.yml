name: daily-candidates

# 毎朝、投稿候補を N 件生成して（画像＋note全文）メールで送る。
# 自動投稿はしない（承認制）。承認はダッシュボードで行い queue.json 経由で
# queue-post ワークフローが指定時刻にXへ投稿する。
on:
  schedule:
    # UTC指定。'0 3 * * *' = 日本時間 12:00（毎日・昼に候補メール／既定は翌日分の投稿候補）
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true にするとメール送信せず候補生成のみ（テスト用）'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: daily-candidates
  cancel-in-progress: false

jobs:
  candidates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Japanese fonts
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install dependencies
        run: npm ci

      - name: 最適化（学びを更新・過去投稿を自己レビュー）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/optimize.mjs

      - name: 候補を生成（リサーチ＋note全文＋画像・学びを反映）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-candidates.mjs

      - name: 候補と学びをリポジトリにコミット（画像の公開URL用）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A candidates learnings.json
          git commit -m "candidates: $(TZ=Asia/Tokyo date +%Y-%m-%d)" || echo "no changes"
          git push

      - name: 候補をメール送信（Resend）
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          REVIEWER_EMAIL: ${{ secrets.REVIEWER_EMAIL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: node scripts/email-candidates.mjs

      - name: 成果物を保存（確認用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: candidates-output
          path: out/
          retention-days: 14
