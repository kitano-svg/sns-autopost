name: daily-note-draft

on:
  schedule:
    # UTC指定。'0 22 * * *' = 日本時間 07:00（毎朝）。公開前に朝チェックしやすい時間。
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-note-draft
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: note下書きを生成 (Claude + Web検索)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/note-draft.mjs

      # 非公開: リポジトリにはコミットせず、Actionsの成果物(artifact)としてのみ保存する。
      # 成果物はリポジトリの権限を持つ人だけがダウンロードでき、一般公開されない。
      # 確認方法: Actions → 該当runを開く → 下部 Artifacts の「note-draft」をダウンロード。
      - name: 下書きを成果物として保存 (非公開・要ダウンロード)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-draft
          path: drafts/
          retention-days: 90
