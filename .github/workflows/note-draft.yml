name: daily-note-draft

on:
  schedule:
    # UTC指定。'0 22 * * *' = 日本時間 07:00（毎朝）。公開前に朝チェックしやすい時間。
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-note-draft
  cancel-in-progress: false

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: note下書きを生成 (Claude + Web検索)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/note-draft.mjs

      - name: 下書きをリポジトリにコミット
        run: |
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts
          git commit -m "note draft: ${DATE}" || echo "no changes"
          git push

      - name: 成果物を保存 (確認用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: note-draft
          path: drafts/
          retention-days: 14
